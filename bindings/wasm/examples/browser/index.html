<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attested Key ZK Browser Smoke</title>
  </head>
  <body>
    <pre id="log">loading...</pre>
    <script type="module">
      import { loadApprovalProofV1Wasm } from "../../lib/index.js";

      const log = document.getElementById("log");

      try {
        const wasm = await loadApprovalProofV1Wasm();
        const circuit = await wasm.generateCircuit();
        log.textContent = `browser module loaded\ncircuit bytes: ${circuit.length}`;
      } catch (err) {
        log.textContent = String(err);
      }
    </script>
  </body>
</html>
